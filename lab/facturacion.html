<!-- facturacion.html -->
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
      <title>Factura Comercial</title>
      <link rel="stylesheet" href="styles.css">
  </head>
    <body>
        <!-- Este menú se repite en todas las páginas para poder movernos entre ellas -->
        <nav>
            <a href="index.html"><button>Portada</button></a>
            <a href="facturacion.html"><button>Simulador de Facturación</button></a>
            <a href="marcoTeorico.html"><button>Marco Teórico</button></a>
        </nav>
        <hr> <!-- Línea divisoria -->

        <!-- ==================== ENCABEZADO ==================== -->
        <h1>Nombre Comercial</h1>
        <p>RUC: 1790012345001</p>
        <p>Quito, Ecuador</p>
        <hr><!-- hr dibuja una línea horizontal para separar secciones -->
        
        <!-- ==================== DATOS DEL CLIENTE ==================== -->
        <h2>Datos del Cliente</h2>
        <form id="formularioCliente"> <!-- form es un formulario (donde el usuario escribe datos) -->
            
            <!-- Campo: Nombre del cliente -->
            <label>Nombre / Razón Social: </label>
            <input type="text" id="nombreCliente" placeholder="Ej. Juan Pérez / Empresa S.A.">
            <br> <!-- br es un salto de línea (como dar "Enter") -->
            
            <!-- Campo: Cédula o RUC -->
            <label>Cédula / RUC: </label>
            <input type="text" id="cedulaCliente" placeholder="10 o 13 dígitos" maxlength="13">
            <br>

            <!-- Campo: Teléfono -->
            <label>Teléfono: </label>
            <input type="tel" id="telefonoCliente" placeholder="Ej. 099-999-9999">
            <br>

            <!-- Campo: E-mail -->
            <label>Correo Electrónico: </label>
            <input type="email" id="emailCliente" placeholder="correo@ejemplo.com">
            <br>

            <!-- Campo: Dirección -->
            <label>Dirección: </label>
            <input type="text" id="direccionCliente" placeholder="Calle principal y secundaria, Ciudad">

        </form>  
        <br>
        <hr> <!-- Otra línea separadora -->
        
        <!-- ==================== TABLA DE PRODUCTOS ==================== -->
        <h2>Productos</h2>
        <button type="button" onclick="agregarProducto()">
            ➕ Agregar Producto
        </button>
        <br><br>

        <table>
            <thead>
                <tr>
                    <th>Cantidad</th>
                    <th>Descripción</th>
                    <th>Precio Unitario</th>
                    <th>Total</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla">
                <!-- Tabla dinámica -->
            </tbody>
        </table>
        <br>

        <!-- ==================== SECCIÓN DE TOTALES ==================== -->
        <hr>
        <p>
            <strong>Subtotal:</strong> $<span id="subtotal">0.00</span>
        </p>
        <p>
            <strong>IVA (15%):</strong> $<span id="iva">0.00</span>
        </p>
        <h3>
            TOTAL: $<span id="totalFinal">0.00</span>
        </h3>
        <br>
        <hr>

        <!-- ==================== BOTÓN DE IMPRIMIR ==================== -->
        <button onclick="imprimirFactura()">🖨️ Imprimir Factura</button>
        <br>

        <script src="script.js"></script>

    </body>
</html>
